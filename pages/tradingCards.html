<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pokémon Trading Card Game | Cards of the Day</title>
    <meta
      name="description"
      content="Explore the Pokémon Trading Card Game page and discover featured cards of the day from the Prismatic Evolutions set."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="site-header">
      <nav class="navbar navbar-expand-lg border-bottom py-3">
        <div class="container px-4 w-100 d-flex align-items-center">
          <a href="../index.html">
            <img
              src="../img/logo-pokemon.png"
              class="brand-logo"
              alt="Pokémon official logo"
            />
          </a>

          <button
            class="navbar-toggler ms-auto"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#mainNav"
            aria-controls="mainNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav mx-lg-auto header-nav">
              <li class="nav-item">
                <a class="nav-link" href="../index.html">Home</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="./pokedex.html">Pokédex</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="./videoGames.html"
                  >Video Games & Apps</a
                >
              </li>

              <li class="nav-item">
                <a
                  class="nav-link active"
                  aria-current="page"
                  href="./tradingCards.html"
                  >Trading Card Game</a
                >
              </li>

              <li class="nav-item">
                <a class="nav-link" href="./animation.html">Animation</a>
              </li>

              <li class="nav-item">
                <a class="nav-link" href="#">More</a>
              </li>
            </ul>

            <a class="nav-link header-login ms-lg-auto" href="#">Log in</a>
          </div>
        </div>
      </nav>
    </header>

    <main class="tcg-page">
      <section class="tcg-hero"></section>

      <section class="tcg-day">
        <h1 class="tcg-title">Cards of the day</h1>

        <div class="tcg-showcase">
          <img
            class="side-card left"
            src="../img/tcg/espeon.png"
            alt="Espeon Pokémon trading card from the Prismatic Evolutions set"
          />
          <img
            class="main-card"
            src="../img/tcg/jolteon.png"
            alt="Jolteon Pokémon trading card featured as card of the day from the Prismatic Evolutions set"
          />
          <img
            class="side-card right"
            src="../img/tcg/leafeon.png"
            alt="Leafeon Pokémon trading card from the Prismatic Evolutions set"
          />
        </div>

        <div class="tcg-caption">
          <button class="tcg-arrow" aria-label="Previous card">‹</button>

          <div>
            <h2>Jolteon</h2>
            <p>Set: Prismatic Evolutions</p>
          </div>

          <button class="tcg-arrow" aria-label="Next card">›</button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-left">
          <h4 class="footer-title">The Pokemon Company</h4>
          <p class="footer-copy">
            © Pokémon. © Nintendo/Creatures Inc./GAME FREAK inc.
          </p>
        </div>

        <nav class="footer-links">
          <a href="#">What is Pokémon?</a>
          <a href="#">Terms of use</a>
          <a href="#">Privacy Policy</a>
          <a href="#">Sitemap</a>
        </nav>

        <span class="footer-locale">
          <i class="bi bi-geo-alt-fill"></i> United States
        </span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
